<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up to the panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(145deg, #f8fbff 0%, #e8f4ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.5;
      color: #1e293b;
    }

    .auth-container {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
    }

    .auth-card {
      background: white;
      border-radius: 32px;
      border: 2px solid #60a5fa;
      padding: 70px 60px 65px;
      box-shadow: 0 20px 70px rgba(0, 90, 200, 0.12);
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #1e40af;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 60px;
    }

    h1 span {
      color: #2563eb;
    }

    .role-toggle {
      display: flex;
      gap: 20px;
      margin-bottom: 60px;
    }

    .role-btn {
      flex: 1;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 999px;
      border: 2px solid #cbd5e1;
      background: white;
      color: #475569;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .role-btn:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .role-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
    }

    .form-row {
      display: flex;
      gap: 32px;
      margin-bottom: 38px;
    }

    .form-group {
      flex: 1;
    }

    label {
      display: block;
      margin-bottom: 12px;
      color: #334155;
      font-size: 1.05rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 18px 20px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      font-size: 1.12rem;
      transition: all 0.25s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 5px rgba(59,130,246,0.15);
      outline: none;
    }

    .terms-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 45px 0 55px;
      font-size: 1.08rem;
      color: #475569;
    }

    .terms-row input {
      width: 24px;
      height: 24px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      padding: 22px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 1.22rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
    }

    .submit-btn:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.4);
    }

    .footer-link {
      text-align: center;
      margin-top: 55px;
      color: #64748b;
      font-size: 1.08rem;
    }

    .footer-link a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .auth-card {
        padding: 55px 35px 50px;
        border-radius: 24px;
      }
      .form-row {
        flex-direction: column;
        gap: 34px;
      }
      h1 {
        font-size: 2.3rem;
      }
      .role-toggle {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <h1>Sign up to the<br><span>panel</span></h1>

      <div class="role-toggle">
        <button class="role-btn">Sign up as admin</button>
        <button class="role-btn active">Sign up as worker</button>
      </div>

      <form>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="Adeli" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Design" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="adely.design@gmail.com" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+373 000 000 000">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••••••••" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="••••••••••••••" required>
        </div>

        <div class="terms-row">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to all the <a href="#">Terms</a> and <a href="#">Privacy Policies</a>
          </label>
        </div>

        <button type="submit" class="submit-btn">Sign up</button>
      </form>

      <p class="footer-link">
        Already have an account? <a href="login.html">Sign In</a>
      </p>

    </div>
  </div>

  <script>
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>

</body>
</html>
