<div class="search-wrapper" style="position:relative; display:flex; align-items:center; gap:14px;">
  <div class="search-bar">
    <input id="headerSearchPeople" type="text" placeholder="Search people" autocomplete="off">
  </div>

  <div class="notif-container">
    <button class="notif-btn" id="notifBtn" aria-label="Notifications">
      <span class="notif-icon">🔔</span>
      <span class="notif-badge" id="notifCount" style="display:none;">0</span>
    </button>
    <div id="notifDrawer" class="notif-drawer" style="display:none;">
      <div class="notif-title">Notifications</div>
      <button id="notifMarkAll" class="notif-markall" style="display:none;">Mark all as read</button>
      <div id="notifList" class="notif-list">No notifications yet</div>
    </div>
  </div>

        <div id="headerSearchResults" class="search-results" style="display:none;"></div>
</div>

<style>
.search-results {
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      z-index: 40;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
  }
  .search-results a {
      display: block;
      padding: 10px 12px;
      color: #0f172a;
      text-decoration: none;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
  }
  .search-results a span { display:block; font-size:0.9rem; color:#64748b; font-weight:400; }
  .search-results a:hover { background: #eef2ff; }
  .search-bar input{
      width:100%;
      padding:10px 12px;
      border:1px solid #e2e8f0;
      border-radius:10px;
      font-size:14px;
      background:#f8fafc;
  }
  .notif-container { position:relative; }
  .notif-btn{
      border:1px solid #e2e8f0;
      background:#f8fafc;
      border-radius:12px;
      width:40px;
      height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      position:relative;
      transition:all .2s;
  }
  .notif-btn:hover{ background:#eef2ff; border-color:#d1d5db; }
  .notif-icon{ font-size:16px; }
  .notif-badge{
      position:absolute;
      top:6px;
      right:6px;
      background:#ef4444;
      color:#fff;
      border-radius:999px;
      padding:0 6px;
      font-size:11px;
      font-weight:700;
      line-height:16px;
      min-width:16px;
      text-align:center;
  }
  .notif-drawer{
      position:absolute;
      top:115%;
      right:0;
      width:240px;
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:14px;
      box-shadow:0 12px 28px rgba(0,0,0,0.12);
      z-index:50;
      overflow:hidden;
  }
  .notif-title{
      padding:10px 12px;
      font-weight:700;
      border-bottom:1px solid #e2e8f0;
      color:#0f172a;
  }
  .notif-markall{
      display:block;
      margin:8px 12px;
      padding:6px 10px;
      border:1px solid #e2e8f0;
      background:#f8fafc;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
      color:#0f172a;
  }
  .notif-markall:hover{ background:#eef2ff; }
  .notif-list{
      max-height:260px;
      overflow-y:auto;
      font-size:13px;
      color:#475569;
      padding:10px 12px;
  }
  .notif-item{
      padding:8px 0;
      border-bottom:1px solid #e2e8f0;
      cursor:pointer;
  }
  .notif-item:hover{ background:#eef2ff; }
  .notif-item .title{ color:#0f172a; font-weight:600; display:flex; align-items:center; gap:6px; }
  .notif-item .title .notif-ico{ width:18px; text-align:center; }
  .notif-item .time{ color:#94a3b8; font-size:12px; }
</style>

<script>
  (function(){
    const input = document.getElementById('headerSearchPeople');
    const box = document.getElementById('headerSearchResults');
    if(!input || !box) return;

    let timer;
    input.addEventListener('input', () => {
      clearTimeout(timer);
      const q = input.value.trim().toLowerCase();
      if(!q){ box.style.display='none'; box.innerHTML=''; return; }
      timer = setTimeout(()=>{
        fetch(`/search-user/?q=${encodeURIComponent(q)}`)
          .then(r=>r.json())
          .then(data=>{
            const res = data.results || [];
            if(!res.length){ box.style.display='none'; box.innerHTML=''; return; }
            box.innerHTML = res.map(u=>`<a href="/team/member/${u.id}">@${u.username}<span>${u.email}</span></a>`).join('');
            box.style.display='block';
          })
          .catch(()=>{ box.style.display='none'; });
      }, 200);
    });

    document.addEventListener('click',(e)=>{
      if(!box.contains(e.target) && e.target !== input){
        box.style.display='none';
      }
    });

    // notifications live fetch
    const notifBtn = document.getElementById('notifBtn');
    const notifDrawer = document.getElementById('notifDrawer');
    const notifCount = document.getElementById('notifCount');
    const notifList = document.getElementById('notifList');
    const notifMarkAll = document.getElementById('notifMarkAll');

    async function loadNotifs(){
      if(!notifList) return;
      try{
        const r = await fetch('/api/notifications/');
        const data = await r.json();
        const items = data.results || [];
        if(items.length){
          notifCount.textContent = items.length;
          notifCount.style.display = 'block';
          notifMarkAll.style.display = 'block';
          const icon = t => ({task:'✅', holiday:'🌴', chat:'💬', other:'🔔'}[t] || '🔔');
          notifList.innerHTML = items.map(n=>`<div class="notif-item" data-id="${n.id}" data-url="${n.url}">
            <div class="title"><span class="notif-ico">${icon(n.type)}</span>${n.text}</div>
            <div class="time">${n.time}</div>
          </div>`).join('');
          notifList.querySelectorAll('.notif-item').forEach(el=>{
            el.addEventListener('click', ()=>{
              const url = el.getAttribute('data-url');
              const id = el.getAttribute('data-id');
              // ascunde imediat
              el.remove();
              // scade badge
              const left = notifList.querySelectorAll('.notif-item').length;
              if(left<=0){ notifCount.style.display='none'; notifMarkAll.style.display='none'; notifList.innerHTML='No notifications yet'; }
              else { notifCount.textContent = left; }
              // trimite mark read
              if(id){ fetch(`/api/notifications/mark/?read=${id}`, {method:'POST', headers:{'X-CSRFToken': getCookie('csrftoken')}}).catch(()=>{}); }
              if(url){
                // mic delay ca badge-ul să rămână actualizat vizual
                setTimeout(()=>{ window.location.href = url; }, 150);
              }
            });
          });
        }else{
          notifCount.style.display = 'none';
          notifMarkAll.style.display = 'none';
          notifList.innerHTML = 'No notifications yet';
        }
      }catch(e){
        notifCount.style.display = 'none';
        notifMarkAll.style.display = 'none';
      }
    }
    loadNotifs();

    notifMarkAll?.addEventListener('click', ()=>{
      fetch('/api/notifications/mark/?read=all', {method:'POST', headers:{'X-CSRFToken': getCookie('csrftoken')}})
        .then(()=>{ notifCount.style.display='none'; notifMarkAll.style.display='none'; notifList.innerHTML='No notifications yet'; });
    });

    notifBtn?.addEventListener('click',(e)=>{
      e.stopPropagation();
      if(!notifDrawer) return;
      const isOpen = notifDrawer.style.display === 'block';
      notifDrawer.style.display = isOpen ? 'none' : 'block';
      if(!isOpen){ loadNotifs(); }
    });
    document.addEventListener('click',(e)=>{
      if(notifDrawer && !notifDrawer.contains(e.target) && e.target !== notifBtn){
        notifDrawer.style.display='none';
      }
    });

    // CSRF helper
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
              const cookie = cookies[i].trim();
              if (cookie.substring(0, name.length + 1) === (name + '=')) {
                  cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                  break;
              }
          }
      }
      return cookieValue;
    }
  })();
</script>
