{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up to the panel</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <h1>Sign up to the<br><span>panel</span></h1>

      {% if messages %}
        {% for message in messages %}
          <p style="color:{% if message.tags == 'error' %}red{% else %}green{% endif %}; text-align:center; margin-bottom:16px;">{{ message }}</p>
        {% endfor %}
      {% endif %}

      <div class="role-toggle">
        <button class="role-btn {% if request.POST.role == 'admin' %}active{% endif %}" data-role="admin">Sign up as admin</button>
        <button class="role-btn {% if not request.POST.role or request.POST.role == 'worker' %}active{% endif %}" data-role="worker">Sign up as worker</button>
      </div>

      <form method="post" action="{% url 'signup' %}">{% csrf_token %}
        <input type="hidden" name="role" id="role" value="{{ request.POST.role|default:'worker' }}" />

        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" placeholder="Adeli" required value="{{ request.POST.first_name }}" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" placeholder="Design" required value="{{ request.POST.last_name }}" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="adely.design@gmail.com" required value="{{ request.POST.email }}" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+373 000 000 000" value="{{ request.POST.phone }}" />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password1" placeholder="••••••••••••••" required />
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="password2" placeholder="••••••••••••••" required />
        </div>

        <div class="terms-row">
          <input type="checkbox" id="terms" name="terms" required {% if request.POST.terms %}checked{% endif %}>
          <label for="terms">
            I agree to all the <a href="#">Terms</a> and <a href="#">Privacy Policies</a>
          </label>
        </div>

        <button type="submit" class="submit-btn">Sign up</button>
      </form>

      <p class="footer-link">
        Already have an account? <a href="{% url 'login' %}">Sign In</a>
      </p>

    </div>
  </div>

  <script>
    const roleBtns = document.querySelectorAll('.role-btn');
    const roleInput = document.getElementById('role');
    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        roleInput.value = btn.dataset.role;
      });
    });
  </script>

</body>
</html>
