<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>See Completed Submission - Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f8fbff;
      color: #1e293b;
      min-height: 100vh;
    }

    .dashboard-layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e2e8f0;
      padding: 30px 20px;
      overflow-y: auto;
      position: fixed;
      height: 100%;
    }

    .sidebar-logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 50px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      color: #64748b;
      text-decoration: none;
      font-size: 1.05rem;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: #eff6ff;
      color: #2563eb;
    }

    .main-content {
      margin-left: 260px;
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .header-left h2 {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .date {
      color: #64748b;
      font-size: 1.1rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 280px;
    }

    .search-bar input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 1rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: #2563eb;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    /* Submission card */
    .submission-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-top: 40px;
    }

    .submission-header {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
    }

    .back-arrow {
      font-size: 1.6rem;
      color: #64748b;
      cursor: pointer;
      margin-right: 20px;
    }

    .submission-title {
      font-size: 2rem;
      color: #1e293b;
    }

    .form-group {
      margin-bottom: 40px;
    }

    label {
      display: block;
      margin-bottom: 12px;
      color: #334155;
      font-size: 1.05rem;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      font-size: 1.1rem;
      min-height: 160px;
      resize: none;
      background: #f8fafc;
      color: #1e293b;
    }

    /* File list */
    .file-list {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 40px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid #e2e8f0;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-icon {
      font-size: 2rem;
      color: #2563eb;
    }

    .file-name {
      font-size: 1.1rem;
      color: #1e293b;
      font-weight: 500;
    }

    .action-buttons {
      display: flex;
      gap: 20px;
      margin-top: 40px;
    }

    .edit-btn, .return-btn {
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .edit-btn {
      background: #2563eb;
      color: white;
      box-shadow: 0 6px 18px rgba(37,99,235,0.3);
    }

    .return-btn {
      background: #f1f5f9;
      color: #64748b;
    }

    .edit-btn:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
    }

    .return-btn:hover {
      background: #e2e8f0;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar {
        width: 80px;
      }
      .sidebar-logo span, .sidebar-nav a span {
        display: none;
      }
      .sidebar-nav a {
        justify-content: center;
      }
      .main-content {
        margin-left: 80px;
      }
    }
  </style>
  {% include 'core/_panel_sidebar_unified.html' %}
</head>
<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      Panel
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="#" class="active">Tasks</a>
      <a href="#">Calendar</a>
      <a href="#">Team</a>
      <a href="#">Chat</a>
      <a href="#">Profile</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main-content">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h2>Today</h2>
        <p class="date">Wednesday, 10 November, 2025</p>
      </div>

      <div class="header-right">
        <div class="search-bar">
          <input type="text" placeholder="Search people">
        </div>
        <div class="user-info">
          <div class="avatar">A</div>
          <span>@AdeliUser</span>
        </div>
      </div>
    </header>

    <!-- Submission card -->
    <section class="submission-card">
      <div class="submission-header">
        <div style="display: flex; align-items: center;">
          <span class="back-arrow" onclick="history.back()">←</span>
          <h2 class="submission-title">Task SUBMISSION</h2>
        </div>
      </div>

      <div class="form-group">
        <label>Submission description</label>
        <textarea readonly>Here is the task, I implemented SQL, HTTP. Also made a proxy app.</textarea>
      </div>

      <div class="form-group">
        <label>File submissions</label>
        <div class="file-list">
          <div class="file-item">
            <span class="file-icon">📄</span>
            <span class="file-name">Task_NO1.pdf</span>
          </div>

          <div class="file-item">
            <span class="file-icon">📦</span>
            <span class="file-name">TASK.zip</span>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="edit-btn">Edit submission</button>
        <button class="return-btn">Return to tasks</button>
      </div>
    </section>

  </main>

</div>

</body>
</html>
