{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login to the panel</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <h1 id="page-title">
        Please sign in to access<br>the <span>administrative panel</span>
      </h1>

      {% if form.errors %}
        <p style="color:red; text-align:center; margin-bottom:16px;">Username sau parolă greșită.</p>
      {% endif %}

      <div class="role-toggle">
        <button class="role-btn {% if False %}active{% endif %}" data-role="admin">Login as admin</button>
        <button class="role-btn active" data-role="worker">Login as worker</button>
      </div>

      <form method="post" action="{% url 'login' %}">{% csrf_token %}
        <input type="hidden" name="next" value="{{ next|default:'/team/' }}" />

        <div class="form-group">
          <label>Username or Email</label>
          <input type="text" name="username" placeholder="adely.design@gmail.com" required autofocus />
        </div>

        <div class="form-group password-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••••••••" required />
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="remember" name="remember" checked />
          <label for="remember">Remember me</label>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <p class="footer-link">
        Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
      </p>

    </div>
  </div>

  <script>
    const titleEl = document.getElementById('page-title');
    const adminText = 'Please sign in to access<br>the <span>administrative panel</span>';
    const workerText = 'Please sign in to access<br>the <span>panel</span>';

    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        titleEl.innerHTML = btn.dataset.role === 'admin' ? adminText : workerText;
      });
    });

    const activeBtn = document.querySelector('.role-btn.active');
    if (activeBtn) {
      titleEl.innerHTML = activeBtn.dataset.role === 'admin' ? adminText : workerText;
    }
  </script>

</body>
</html>
