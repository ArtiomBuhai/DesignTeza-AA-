<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages - Panel</title>
  <style>
    :root {
      --bg: #f8fbff;
      --text: #1e293b;
      --card: white;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #10b981;
      --gray: #64748b;
      --light-gray: #f1f5f9;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #e2e8f0;
      --card: #1e293b;
      --border: #334155;
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --success: #34d399;
      --gray: #94a3b8;
      --light-gray: #1e293b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .dashboard-layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 30px 20px;
      overflow-y: auto;
      position: fixed;
      height: 100%;
      transition: background 0.3s;
    }

    .sidebar-logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 50px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      color: var(--gray);
      text-decoration: none;
      font-size: 1.05rem;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: var(--light-gray);
      color: var(--primary);
    }

    .main-content {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }

    .header-left h2 {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .date {
      color: var(--gray);
      font-size: 1rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--gray);
    }

    .search-bar {
      background: var(--light-gray);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      width: 280px;
      display: flex;
      align-items: center;
      transition: all 0.3s;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1rem;
      color: var(--text);
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .chat-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .chat-list {
      width: 380px;
      background: var(--card);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      transition: background 0.3s;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chat-item:hover, .chat-item.active {
      background: var(--light-gray);
    }

    .chat-avatar {
      width: 52px;
      height: 52px;
      background: #cbd5e1;
      border-radius: 50%;
      margin-right: 16px;
      position: relative;
      flex-shrink: 0;
      background: linear-gradient(135deg, #cbd5e1, #94a3b8);
    }

    .chat-avatar.online::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      background: var(--success);
      border: 2px solid var(--card);
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-name {
      font-weight: 600;
      font-size: 1.05rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-last-msg {
      font-size: 0.95rem;
      color: var(--gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-typing {
      color: var(--success);
      font-style: italic;
      font-size: 0.9rem;
    }

    .chat-time {
      font-size: 0.85rem;
      color: #94a3b8;
      white-space: nowrap;
      margin-left: auto;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 20px 30px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background 0.3s;
    }

    .chat-header-avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #cbd5e1, #94a3b8);
      border-radius: 50%;
      position: relative;
    }

    .chat-header-avatar.online::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      background: var(--success);
      border: 3px solid var(--card);
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.3);
      animation: pulse 2s infinite;
    }

    .chat-header-info h3 {
      font-size: 1.3rem;
      margin-bottom: 4px;
    }

    .chat-header-info .status {
      color: var(--success);
      font-size: 0.95rem;
    }

    .chat-messages {
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: var(--bg);
      transition: background 0.3s;
    }

    .message {
      max-width: 70%;
      padding: 14px 20px;
      border-radius: 20px;
      line-height: 1.5;
      word-wrap: break-word;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.4s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.received {
      background: var(--card);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .message.sent {
      background: var(--primary);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .chat-input-area {
      padding: 20px 30px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.3s;
    }

    .chat-input-area input {
      flex: 1;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 1.05rem;
      background: var(--light-gray);
      transition: all 0.2s;
    }

    .chat-input-area input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .chat-actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--gray);
      cursor: pointer;
      transition: color 0.2s;
    }

    .action-btn:hover {
      color: var(--primary);
    }

    .send-btn {
      padding: 16px 32px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar {
        width: 80px;
      }
      .sidebar-logo span, .sidebar-nav a span {
        display: none;
      }
      .sidebar-nav a {
        justify-content: center;
      }
      .main-content {
        margin-left: 80px;
      }
      .chat-list {
        width: 100%;
        max-width: 300px;
      }
    }

    @media (max-width: 768px) {
      .chat-list {
        width: 100%;
      }
      .chat-header, .chat-input-area {
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      Panel
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="#">Tasks</a>
      <a href="#">Calendar</a>
      <a href="#">Team</a>
      <a href="#" class="active">Chat</a>
      <a href="#">Profile</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main-content">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h2>Today</h2>
        <p class="date">Wednesday, 10 November, 2025</p>
      </div>

      <div class="header-right">
        <div class="search-bar">
          <input type="text" placeholder="Search people">
        </div>
        <div class="user-info">
          <div class="avatar">A</div>
          <span>@AdeliUser</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </header>

    <!-- Chat layout -->
    <div class="chat-container">
      <!-- Lista conversații -->
      <div class="chat-list">
        <div class="chat-item active">
          <div class="chat-avatar online"></div>
          <div class="chat-info">
            <div class="chat-name">Name</div>
            <div class="chat-last-msg">Hi, I have a question</div>
          </div>
          <div class="chat-time">15:42</div>
        </div>

        <div class="chat-item">
          <div class="chat-avatar"></div>
          <div class="chat-info">
            <div class="chat-name">Name</div>
            <div class="chat-last-msg chat-typing">... is typing</div>
          </div>
          <div class="chat-time">16:45</div>
        </div>

        <div class="chat-item">
          <div class="chat-avatar"></div>
          <div class="chat-info">
            <div class="chat-name">Name</div>
            <div class="chat-last-msg">This photo...</div>
          </div>
          <div class="chat-time">16:45</div>
        </div>
      </div>

      <!-- Chat principal -->
      <div class="chat-main">
        <div class="chat-header">
          <div class="chat-header-avatar online"></div>
          <div class="chat-header-info">
            <h3>Name</h3>
            <div class="status">Online</div>
          </div>
        </div>

        <div class="chat-messages" id="messages">
          <div class="message received">Hi, I have a question</div>
          <div class="message received">This photo...</div>
          <div class="message received">Can you help me?</div>
          <div class="message sent">Yes, of course. You need to do the task.</div>
        </div>

        <div class="chat-input-area">
          <button class="action-btn" onclick="alert('Emoji picker coming soon!')">😊</button>
          <button class="action-btn" onclick="alert('Attach file coming soon!')">📎</button>
          <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

  </main>

</div>

<script>
  // Dark mode toggle
  function toggleTheme() {
    const body = document.body;
    if (body.getAttribute('data-theme') === 'dark') {
      body.removeAttribute('data-theme');
    } else {
      body.setAttribute('data-theme', 'dark');
    }
  }

  // Send message (simulare)
  function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    const messages = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'message sent';
    msg.textContent = text;
    messages.appendChild(msg);

    // Scroll jos
    messages.scrollTop = messages.scrollHeight;

    input.value = '';
  }

  // Auto-scroll la încărcare
  window.onload = () => {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  };
</script>

</body>
</html>
